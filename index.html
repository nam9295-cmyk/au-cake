  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      #vg-chat-launcher {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 2147483000;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 2px solid #f7e7b7;
        border-radius: 999px;
        background: #005241;
        color: #fff8e6;
        box-shadow: 0 18px 38px rgba(0, 82, 65, 0.25);
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.02em;
        padding: 13px 18px;
      }
      .vg-chat-icon {
        position: relative;
        flex: 0 0 auto;
        width: 20px;
        height: 16px;
        border: 2px solid currentColor;
        border-radius: 999px;
      }
      .vg-chat-icon::before {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 3px;
        width: 6px;
        height: 6px;
        border-bottom: 2px solid currentColor;
        border-left: 2px solid currentColor;
        background: #005241;
        transform: skewY(-35deg);
      }
      .vg-chat-icon::after {
        content: "•••";
        position: absolute;
        top: -2px;
        left: 3px;
        font-size: 8px;
        letter-spacing: 1px;
        line-height: 16px;
      }
      #vg-chat-launcher[disabled] {
        cursor: wait;
        opacity: 0.78;
      }
      @media (max-width: 767px) {
        #vg-chat-launcher {
          right: calc(16px + env(safe-area-inset-right));
          bottom: calc(16px + env(safe-area-inset-bottom));
          width: 52px;
          min-width: 52px;
          height: 52px;
          padding: 0;
          justify-content: center;
          gap: 0;
          box-shadow: 0 12px 28px rgba(0, 82, 65, 0.22);
        }
        #vg-chat-launcher .vg-chat-label {
          display: none;
        }
      }
    </style>
    <button id="vg-chat-launcher" type="button" aria-label="Message us" title="Message us">
      <span class="vg-chat-icon" aria-hidden="true"></span>
      <span class="vg-chat-label">Message us</span>
    </button>
    <script>
      (function() {
        var BASE_URL = "https://chat.verygood-chocolate.com";
        var WEBSITE_TOKEN = "JPyEBcQEq4FvcZFL5NxeiXyC";
        var launcher = document.getElementById("vg-chat-launcher");
        if (window.location.pathname === "/calendar" || window.location.pathname === "/calendar.html") {
          launcher.remove();
          return;
        }
        var launcherLabel = launcher.querySelector(".vg-chat-label");
        var hasLoadedSdk = false;

        function setLauncherLabel(label) {
          launcherLabel.textContent = label;
          launcher.setAttribute("aria-label", label);
          launcher.setAttribute("title", label);
        }

        window.chatwootSettings = {
          hideMessageBubble: true,
          position: "right",
          type: "standard",
          locale: "en",
          useBrowserLanguage: false
        };

        function openChat() {
          if (window.gtag) {
            window.gtag("event", "chat_open", { method: "website_chat" });
          }
          if (window.$chatwoot && window.$chatwoot.hasLoaded) {
            window.$chatwoot.toggle("open");
            launcher.style.display = "none";
            return;
          }

          launcher.disabled = true;
          setLauncherLabel("Opening chat");

          if (!hasLoadedSdk) {
            hasLoadedSdk = true;
            var script = document.createElement("script");
            script.src = BASE_URL + "/packs/js/sdk.js";
            script.async = true;
            script.onload = function() {
              window.chatwootSDK.run({
                websiteToken: WEBSITE_TOKEN,
                baseUrl: BASE_URL
              });
            };
            script.onerror = function() {
              launcher.disabled = false;
              setLauncherLabel("Message us");
            };
            document.body.appendChild(script);
          }
        }

        window.addEventListener("chatwoot:ready", function() {
          launcher.disabled = false;
          setLauncherLabel("Message us");
          if (window.$chatwoot) {
            window.$chatwoot.toggle("open");
            launcher.style.display = "none";
          }
        });
        window.addEventListener("chatwoot:closed", function() {
          launcher.style.display = "inline-flex";
        });
        launcher.addEventListener("click", openChat);
      })();
    </script>
  </body>
</html>
